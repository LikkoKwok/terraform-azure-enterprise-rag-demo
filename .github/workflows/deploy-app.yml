name: Deploy App

'on':
  push:
    branches: [main]
    paths:
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      WEBAPP_NAME: app-rag-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      RESOURCE_GROUP: rg-rag-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Deployment Package
        run: |
          mkdir -p build/package
          cp -R app/* build/package/
          cp requirements.txt build/package/requirements.txt
          cd build/package
          zip -r ../app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Startup Command
        run: |
          az webapp config set \
            --name "${WEBAPP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: build/app.zip